    /* ========== ENVELOPE SPLASH SCREEN STYLES ========== */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 50%, #FFB6C1 100%);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.8s ease-in-out;
      perspective: 1200px;
    }

    .splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .envelope-container {
      /* text-align: center;
      position: relative;
      width: 100%;
      max-width: min(500px, 90%);
      padding: 20px; */
      text-align: center;
      position: relative;
      width: 100%;
      max-width: min(500px, 90%);
      padding: 20px;
      transform-style: preserve-3d;
      animation: zoomIn3D 1.5s ease-out forwards;
    }

    @keyframes zoomIn3D {
      0% {
        opacity: 0;
        transform: scale(0.5) rotateX(-20deg) rotateY(10deg) translateZ(-300px);
        filter: blur(5px);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.1) rotateX(5deg) rotateY(-5deg) translateZ(50px);
        filter: blur(0px);
      }
      70% {
        transform: scale(0.95) rotateX(0deg) rotateY(0deg) translateZ(0px);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotateX(0deg) rotateY(0deg) translateZ(0px);
        filter: blur(0px);
      }
    }

    .envelope {
      position: relative;
      width: 100%;
      max-width: min(400px, 85vw);
      height: auto;
      aspect-ratio: 3 / 2;
      margin: 0 auto;
      cursor: pointer;
      /* transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);   */
    }
    .envelope:hover {
      transform: rotateY(5deg) rotateX(5deg) scale(1.02);
    }

    /* Envelope Flap */
    .envelope-flap {
      position: absolute;
      font-size: larger;
      color: #963e15;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #fff 0%, #ffe0e0 100%);
      border: 2px solid gold;
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border-radius: 15px 15px 15px 15px;
      z-index: 5;
      transform-origin: top;
      transform: rotateX(0deg);
      overflow: hidden;
      /* display: flex; */
    }
    .envelope:hover .envelope-flap {
      transform: rotateX(180deg);
    }
    .envelope-flap::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://optim.tildacdn.net/tild6364-3438-4161-b964-613234643831/-/format/webp/623915249_2629494717.png.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.8;
      pointer-events: none;
    }

    .envelope:hover .envelope-flap {
      transform: rotateX(20deg);
    }

    .envelope-flap::before {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      width: 100%;
      height: 20px;
      background: linear-gradient(135deg, #ffe0e0 0%, #ffcece 100%);
      border-radius: 0 0 5px 5px;
      z-index: 6;
    }
    .demo-gif {
    width: 150px;
    height: auto;
    border-radius: 12px;
  }
    /* Heart Button */
    .heart-button {
      position: absolute;
      top: 85%;
      left: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      background: transparent;
      display: inline-block;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      animation: heartbeat 1.5s ease-in-out infinite;
      z-index: 10;
    }
    .demo-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* background: rgba(0,0,0,0.1); */
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      animation: fadeOut 5s forwards;
      animation-delay: 3s;  
    }

    @keyframes fadeOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8); display: none; }
  }
    
    .heart-icon {
      width: clamp(35px, 8vw, 60px);
      height: auto;
      display: block;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .heart-button:hover .heart-icon {
      transform: scale(1.1);
    }

    @keyframes heartbeat {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Envelope Body */

    .splash-screen.fade-out .envelope-container {

    .main-content {
      opacity: 0;

// Optimized parallax with mobile zoom
(function() {
  let ticking = false;
  let lastScrollY = 0;
  
  function updateVideo() {
    const video = document.querySelector('.hero-video');
    if (!video) return;
    
    const scrolled = window.pageYOffset;
    const width = window.innerWidth;
    
    // Responsive settings
    let rate, zoomScale;
    if (width <= 480) {
      rate = 0.6;
      zoomScale = 1.2;
    } else if (width <= 768) {
      rate = 0.5;
      zoomScale = 1.12;
    } else {
      rate = 0.3;
      zoomScale = 1.05;
    }
    
    // Apply transform with smooth transition
    video.style.transform = `translateY(${scrolled * rate}px) scale(${zoomScale})`;
    lastScrollY = scrolled;
  }
  
  // Throttled scroll listener
  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        updateVideo();
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
  
  // Update on resize
  let resizeTimeout;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(updateVideo, 200);
  });
  
  // Initial call
  setTimeout(updateVideo, 100);
})();

  const GOOGLE_SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw9qptv6ArMZgC4vKleasxuG9kiT_8m_bYGylk5joKgNsaBAoKGXqDt2uBa8FBpD_bi/exec";

  // Countdown
  const daysSpan = document.getElementById('days');
  const hoursSpan = document.getElementById('hours');
  const minutesSpan = document.getElementById('minutes');
  const secondsSpan = document.getElementById('seconds');

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = TARGET_DATE.getTime() - now;
    if (distance < 0) {
      daysSpan.innerText = '0'; hoursSpan.innerText = '0'; minutesSpan.innerText = '0'; secondsSpan.innerText = '0';
      if (window.countdownInterval) clearInterval(window.countdownInterval);
      return;
    }
    daysSpan.innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
    hoursSpan.innerText = Math.floor((distance % 86400000) / 3600000);
    minutesSpan.innerText = Math.floor((distance % 3600000) / 60000);
    secondsSpan.innerText = Math.floor((distance % 60000) / 1000);
  }
  updateCountdown();
  window.countdownInterval = setInterval(updateCountdown, 1000);

  // Confetti
  function startConfetti(duration) {
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed'; canvas.style.top = '0'; canvas.style.left = '0';
    canvas.style.width = '100%'; canvas.style.height = '100%'; canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '9999';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    for (let i = 0; i < 150; i++) {
      particles.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
        size: Math.random() * 8 + 4, speedY: Math.random() * 5 + 3, speedX: Math.random() * 2 - 1,
        color: `hsl(${Math.random() * 60 + 20}, 70%, 60%)`
      });
    }
    let startTime = Date.now();
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let allDead = true;
      for (let p of particles) {
        p.y += p.speedY; p.x += p.speedX;
        if (p.y < canvas.height + 50) {
          allDead = false;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.size, p.size);
        }
      }
      if (!allDead && Date.now() - startTime < duration) requestAnimationFrame(animate);
      else canvas.remove();
    }
    animate();
  }

  document.getElementById('celebrateBtn')?.addEventListener('click', () => {
    startConfetti(2500);
    alert("🎉 Thank you for celebrating with us! 🎉");
  });

})();
</script>
